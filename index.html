<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Video Assignment</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4 selection:bg-blue-500/30">
    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 2 hours, 56 min, 34 seconds in seconds
        const MAX_ALLOWED_TIME = 10594; 
        const VIDEO_ID = '1BK5i-1smac';

        // Local Storage Helpers for saving progress across sessions
        const getSavedProgress = () => parseFloat(localStorage.getItem('aztec_video_max_time')) || 0;
        const getSavedCurrent = () => parseFloat(localStorage.getItem('aztec_video_curr_time')) || 0;
        const getSavedViolations = () => parseInt(localStorage.getItem('aztec_video_violations')) || 0;

        const App = () => {
            const [view, setView] = useState('instructions'); // 'instructions', 'video', 'warning', 'penalty', 'finished'
            
            const [player, setPlayer] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(getSavedCurrent);
            const [ccEnabled, setCcEnabled] = useState(false);
            const [playbackRate, setPlaybackRate] = useState(1);
            
            const [maxTimeWatched, setMaxTimeWatched] = useState(getSavedProgress);
            const maxTimeWatchedRef = useRef(getSavedProgress());
            const lastSeekTimeRef = useRef(0);
            
            // Tab violation tracking
            const [violations, setViolations] = useState(getSavedViolations);
            const playbackRateRef = useRef(1);

            const playerContainerRef = useRef(null);
            const intervalRef = useRef(null);

            // Tab visibility detection (Anti-Cheat)
            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.hidden && view === 'video') {
                        if (player && typeof player.pauseVideo === 'function') {
                            player.pauseVideo();
                        }
                        
                        setViolations(prev => {
                            const newCount = prev + 1;
                            localStorage.setItem('aztec_video_violations', newCount.toString()); // Save penalty
                            return newCount;
                        });
                        setView('warning');
                    }
                };

                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => {
                    document.removeEventListener("visibilitychange", handleVisibilityChange);
                };
            }, [view, player]);

            // Load YouTube Iframe API
            useEffect(() => {
                if (view !== 'video') return;

                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    
                    window.onYouTubeIframeAPIReady = initializePlayer;
                } else if (!player) {
                    initializePlayer();
                }

                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, [view]);

            const initializePlayer = () => {
                const startTime = Math.floor(getSavedCurrent());
                const newPlayer = new window.YT.Player(playerContainerRef.current, {
                    videoId: VIDEO_ID,
                    playerVars: {
                        controls: 0,       
                        disablekb: 1,      
                        rel: 0,            
                        modestbranding: 1, 
                        fs: 0,             
                        iv_load_policy: 3, 
                        start: startTime,  // Tell YouTube API to start at saved time
                        cc_load_policy: 1  
                    },
                    events: {
                        onReady: (event) => {
                            setPlayer(event.target);
                            event.target.setOption('captions', 'track', {}); 
                            
                            // Ensure the player seeks to the saved time immediately upon buffering
                            const savedTime = getSavedCurrent();
                            if (savedTime > 0) {
                                event.target.seekTo(savedTime, true);
                                lastSeekTimeRef.current = Date.now();
                            }
                        },
                        onStateChange: (event) => {
                            setIsPlaying(event.data === window.YT.PlayerState.PLAYING);
                            if (event.data === window.YT.PlayerState.PLAYING) {
                                // Enforce selected speed
                                if (event.target.getPlaybackRate() !== playbackRateRef.current) {
                                    event.target.setPlaybackRate(playbackRateRef.current);
                                }
                            }
                        }
                    }
                });
            };

            // Main Video Loop (Time tracking, Anti-fast-forward, End limit)
            useEffect(() => {
                if (isPlaying && player && view === 'video') {
                    intervalRef.current = setInterval(() => {
                        const time = player.getCurrentTime();
                        
                        // Check if they hit the 2h 56m 34s limit
                        if (time >= MAX_ALLOWED_TIME) {
                            player.pauseVideo();
                            setView('finished');
                            return;
                        }

                        // Prevent anti-cheat loop fighting asynchronous YouTube seeks
                        if (Date.now() - lastSeekTimeRef.current < 1500) {
                            setCurrentTime(time);
                            return;
                        }
                        
                        let currentMax = maxTimeWatchedRef.current;

                        // Prevent fast forwarding
                        if (time > currentMax + 2) { 
                            player.seekTo(currentMax, true);
                            lastSeekTimeRef.current = Date.now();
                            return;
                        } else {
                            // Only update if time is legitimately progressing (ignores initial 0s buffering glitches)
                            if (time > 0 || currentMax === 0) {
                                const newMax = Math.max(currentMax, time);
                                maxTimeWatchedRef.current = newMax;
                                setMaxTimeWatched(newMax);
                                localStorage.setItem('aztec_video_max_time', newMax.toString()); // Save max progress
                            }
                        }

                        if (time > 0 || currentMax === 0) {
                            setCurrentTime(time);
                            localStorage.setItem('aztec_video_curr_time', time.toString()); // Save exact current time
                        }
                    }, 250);
                } else {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                }

                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, [isPlaying, player, view]);

            const togglePlayPause = () => {
                if (!player) return;
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            };

            const toggleCC = () => {
                if (!player) return;
                if (ccEnabled) {
                    player.setOption('captions', 'track', {}); 
                    setCcEnabled(false);
                } else {
                    player.setOption('captions', 'track', {languageCode: 'en'}); 
                    setCcEnabled(true);
                }
            };

            const toggleSpeed = () => {
                if (!player) return;
                const newRate = playbackRate === 1 ? 1.25 : 1;
                setPlaybackRate(newRate);
                playbackRateRef.current = newRate;
                player.setPlaybackRate(newRate);
            };

            const handleRewind = () => {
                if (!player) return;
                const newTime = Math.max(0, player.getCurrentTime() - 10);
                lastSeekTimeRef.current = Date.now(); 
                player.seekTo(newTime, true);
                setCurrentTime(newTime);
            };

            const handleTimelineClick = (e) => {
                if (!player) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const clickRatio = (e.clientX - rect.left) / rect.width;
                let targetTime = clickRatio * MAX_ALLOWED_TIME;

                if (targetTime > maxTimeWatchedRef.current) {
                    targetTime = maxTimeWatchedRef.current; 
                }
                
                lastSeekTimeRef.current = Date.now(); 
                player.seekTo(targetTime, true);
                setCurrentTime(targetTime);
            };

            const returnToVideoFromWarning = () => {
                if (player) {
                    const penaltyTime = 20;
                    const newTime = Math.max(0, player.getCurrentTime() - penaltyTime);
                    
                    // We must reduce the maxTimeWatched so they can't skip past the penalty
                    const newMax = Math.max(0, maxTimeWatchedRef.current - penaltyTime);
                    maxTimeWatchedRef.current = newMax;
                    setMaxTimeWatched(newMax);

                    // Save the penalized time to local storage
                    localStorage.setItem('aztec_video_max_time', newMax.toString());
                    localStorage.setItem('aztec_video_curr_time', newTime.toString());

                    lastSeekTimeRef.current = Date.now(); 
                    player.seekTo(newTime, true);
                    setCurrentTime(newTime);
                }
                setView('video');
            };

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = Math.floor(seconds % 60).toString().padStart(2, '0');
                return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
            };

            // Styles extracted for GitHub Pages compatibility
            const maxWatchedStyle = { width: `${(maxTimeWatched / MAX_ALLOWED_TIME) * 100 || 0}%` };
            const currentTimeStyle = { width: `${(currentTime / MAX_ALLOWED_TIME) * 100 || 0}%` };

            // Render Views
            if (view === 'instructions') {
                return (
                    <div className="max-w-4xl w-full bg-slate-800 p-10 rounded-2xl shadow-2xl border border-slate-700">
                        <h1 className="text-4xl font-black text-white mb-8 border-b border-slate-700 pb-6 uppercase tracking-wider text-center">
                            Instructions
                        </h1>
                        <div className="space-y-6 text-2xl leading-relaxed text-slate-200 font-medium">
                            <p>
                                Watch only the first <strong className="text-amber-400">2 hours, 56 min 34 seconds</strong> (that is the first 4 episodes of the show).
                            </p>
                            <p>
                                Then start to answer the questions in the paper provided. You will have either 2 or 4 class periods to complete (depending on A or B day). 
                            </p>
                            <p className="text-red-400 font-bold bg-red-900/20 p-4 rounded-xl border border-red-500/30">
                                Do not take the paper home, you will turn it to the teacher at the end of every period. 
                            </p>
                            <p className="text-xl text-slate-400 italic">
                                One of this is going to be considered a test grade.
                            </p>
                            <p className="text-lg text-green-400 font-bold bg-green-900/20 p-4 rounded-xl border border-green-500/30">
                                💾 Your progress is automatically saved. If you accidentally close this tab, you will resume exactly where you left off.
                            </p>
                        </div>
                        <div className="mt-12 flex justify-center">
                            <button 
                                onClick={() => setView('video')}
                                className="bg-green-600 hover:bg-green-500 text-white px-12 py-5 rounded-xl font-black text-2xl shadow-[0_0_20px_rgba(22,163,74,0.4)] transition-all transform hover:scale-105 uppercase tracking-wide"
                            >
                                Go to the Video
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'warning') {
                return (
                    <div className="max-w-4xl w-full bg-amber-900 p-12 rounded-3xl shadow-2xl border-4 border-amber-500 text-center animate-pulse">
                        <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-amber-400 mb-6"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        <h1 className="text-6xl font-black text-white mb-6 uppercase tracking-widest">Tab Changed!</h1>
                        <p className="text-3xl text-amber-200 font-bold mb-4">
                            You navigated away from the video.
                        </p>
                        <p className="text-2xl text-amber-100 mb-10">
                            Please keep this tab active to continue watching.
                        </p>
                        <div>
                            <button 
                                onClick={returnToVideoFromWarning}
                                className="bg-amber-600 hover:bg-amber-500 text-white px-12 py-5 rounded-xl font-black text-2xl shadow-[0_0_20px_rgba(217,119,6,0.4)] transition-all transform hover:scale-105 uppercase tracking-wide"
                            >
                                Go Back To Video
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'finished') {
                return (
                    <div className="max-w-3xl w-full bg-slate-800 p-10 rounded-2xl shadow-2xl border border-slate-700 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-green-400 mb-6"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                        <h1 className="text-4xl font-black text-white mb-4">Video Completed</h1>
                        <p className="text-2xl text-slate-300">
                            You have reached the 2 hour, 56 minute, and 34-second mark.
                        </p>
                        <p className="mt-8 text-xl text-amber-400 font-bold">
                            Please complete the questions on your provided paper. Do not forget to turn it in!
                        </p>
                    </div>
                );
            }

            return (
                <div className="w-full flex flex-col items-center gap-6 animate-fadeIn">
                    <div className="text-center space-y-2">
                        <h1 className="text-3xl font-bold text-white">Class Video Assignment</h1>
                        <p className="text-red-400 font-bold animate-pulse">Do NOT open other tabs or windows.</p>
                    </div>

                    <div className="w-full flex flex-col rounded-xl shadow-2xl overflow-hidden border border-slate-700">
                        <div className="relative w-full aspect-video bg-black">
                            <div className="absolute inset-0 pointer-events-none">
                                <div ref={playerContainerRef} className="w-full h-full"></div>
                            </div>
                        </div>

                        {/* Custom Control Bar */}
                        <div className="w-full bg-slate-800 p-5 flex flex-col gap-3 z-40">
                            {/* Timeline strictly mapped to the assigned duration */}
                            <div 
                                className="relative w-full h-3 bg-slate-700 rounded-full cursor-pointer group"
                                onClick={handleTimelineClick}
                            >
                                {/* Max Watched Buffer */}
                                <div 
                                    className="absolute top-0 left-0 h-full bg-slate-500 rounded-full opacity-50 transition-all duration-200"
                                    style={maxWatchedStyle}
                                ></div>
                                
                                {/* Current Time Progress */}
                                <div 
                                    className="absolute top-0 left-0 h-full bg-blue-500 rounded-full transition-all duration-200"
                                    style={currentTimeStyle}
                                ></div>
                            </div>

                            {/* Controls row */}
                            <div className="flex items-center gap-5 mt-2">
                                <button 
                                    onClick={togglePlayPause}
                                    className="text-white hover:text-blue-400 transition-colors focus:outline-none"
                                    title={isPlaying ? "Pause" : "Play"}
                                >
                                    {isPlaying ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                                    )}
                                </button>
                                
                                <button 
                                    onClick={handleRewind}
                                    className="text-white hover:text-blue-400 transition-colors focus:outline-none flex items-center gap-1"
                                    title="Rewind 10 Seconds"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                    <span className="text-sm font-bold -ml-0.5">10s</span>
                                </button>
                                
                                <button 
                                    onClick={toggleCC}
                                    className={`transition-colors focus:outline-none ${ccEnabled ? 'text-blue-400' : 'text-slate-400 hover:text-white'}`}
                                    title={ccEnabled ? "Turn Off Captions" : "Turn On Captions"}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="14" x="3" y="5" rx="2" ry="2"/><path d="M7 15h4M15 15h2M7 11h2M13 11h4"/></svg>
                                </button>

                                {/* Playback Speed Button */}
                                <div className="ml-2 flex items-center gap-3 hidden md:flex">
                                    <span className="text-2xl">😊</span>
                                    <span className="text-sm font-bold text-amber-400 uppercase tracking-wide">ok, you can speed up to 1.25x</span>
                                    
                                    {/* Noticeable Red Arrow */}
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-red-500 animate-pulse drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]">
                                        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                                    </svg>
                                    
                                    <button 
                                        onClick={toggleSpeed}
                                        className={`px-4 py-1.5 rounded-lg border-2 font-bold transition-all focus:outline-none ${playbackRate === 1.25 ? 'bg-amber-500/20 border-amber-400 text-amber-400 shadow-[0_0_10px_rgba(251,191,36,0.3)]' : 'border-slate-500 text-white hover:border-white shadow-[0_0_10px_rgba(255,255,255,0.2)]'}`}
                                        title="Toggle Speed"
                                    >
                                        {playbackRate}x
                                    </button>
                                </div>

                                <div className="text-base font-medium text-slate-300 font-mono ml-auto">
                                    {formatTime(currentTime)} / {formatTime(MAX_ALLOWED_TIME)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
