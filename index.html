                        }
                        
                        setViolations(prev => {
                            const newCount = prev + 1;
                            localStorage.setItem('aztec_video_violations', newCount.toString()); // Save penalty
                            return newCount;
                        });
                    }
                };

                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => {
                    document.removeEventListener("visibilitychange", handleVisibilityChange);
                };
            }, [view, player]);

            // Load YouTube Iframe API
            useEffect(() => {
                if (view !== 'video') return;

                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    const firstScriptTag = document.getElementsByTagName('script')[0];
                    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    
                    window.onYouTubeIframeAPIReady = initializePlayer;
                } else if (!player) {
                    initializePlayer();
                }

                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, [view]);

            const initializePlayer = () => {
                const startTime = Math.floor(getSavedCurrent());
                const newPlayer = new window.YT.Player(playerContainerRef.current, {
                    videoId: VIDEO_ID,
                    playerVars: {
                        controls: 0,       
                        disablekb: 1,      
                        rel: 0,            
                        modestbranding: 1, 
                        fs: 0,             
                        iv_load_policy: 3, 
                        start: startTime,  
                        cc_load_policy: 1  
                    },
                    events: {
                        onReady: (event) => {
                            setPlayer(event.target);
                            event.target.setOption('captions', 'track', {}); 
                            
                            const savedTime = getSavedCurrent();
                            if (savedTime > 0) {
                                event.target.seekTo(savedTime, true);
                                lastSeekTimeRef.current = Date.now();
                            }
                        },
                        onStateChange: (event) => {
                            setIsPlaying(event.data === window.YT.PlayerState.PLAYING);
                            if (event.data === window.YT.PlayerState.PLAYING) {
                                if (event.target.getPlaybackRate() !== playbackRateRef.current) {
                                    event.target.setPlaybackRate(playbackRateRef.current);
                                }
                            }
                        }
                    }
                });
            };

            // Main Video Loop (Time tracking, Anti-fast-forward, Questions, End limit)
            useEffect(() => {
                if (isPlaying && player && view === 'video') {
                    intervalRef.current = setInterval(() => {
                        const time = player.getCurrentTime();
                        
                        // Check if they hit the 2h 56m 34s limit
                        if (time >= MAX_ALLOWED_TIME) {
                            player.pauseVideo();
                            setView('finished');
                            return;
                        }

                        // Prevent anti-cheat loop fighting asynchronous YouTube seeks
                        if (Date.now() - lastSeekTimeRef.current < 1500) {
                            setCurrentTime(time);
                            return;
                        }
                        
                        let currentMax = maxTimeWatchedRef.current;

                        // Prevent fast forwarding (Bypassed if Teacher Mode is active)
                        if (!isTeacherModeRef.current && time > currentMax + 2) { 
                            player.seekTo(currentMax, true);
                            lastSeekTimeRef.current = Date.now();
                            return;
                        } else {
                            if (time > 0 || currentMax === 0) {
                                const newMax = Math.max(currentMax, time);
                                maxTimeWatchedRef.current = newMax;
                                setMaxTimeWatched(newMax);
                                localStorage.setItem('aztec_video_max_time', newMax.toString()); 
                            }
                        }

                        if (time > 0 || currentMax === 0) {
                            setCurrentTime(time);
                            localStorage.setItem('aztec_video_curr_time', time.toString()); 
                        }

                        // === Check for Questions ===
                        if (!activeQuestionRef.current) {
                            const upcoming = QUIZ_QUESTIONS.find(q => 
                                time >= q.timestamp && 
                                time < q.timestamp + 1 && // 1 second trigger window
                                !answeredQuestionsRef.current.has(q.id)
                            );
                            
                            if (upcoming) {
                                player.pauseVideo();
                                setActiveQuestion(upcoming);
                            }
                        }

                    }, 250);
                } else {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                }

                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, [isPlaying, player, view]);

            const togglePlayPause = () => {
                if (!player) return;
                if (isPlaying) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            };

            const toggleCC = () => {
                if (!player) return;
                if (ccEnabled) {
                    player.setOption('captions', 'track', {}); 
                    setCcEnabled(false);
                } else {
                    player.setOption('captions', 'track', {languageCode: 'en'}); 
                    setCcEnabled(true);
                }
            };

            const toggleSpeed = () => {
                if (!player) return;
                const newRate = playbackRate === 1 ? 1.25 : 1;
                setPlaybackRate(newRate);
                playbackRateRef.current = newRate;
                player.setPlaybackRate(newRate);
            };

            const handleRewind = () => {
                if (!player) return;
                const newTime = Math.max(0, player.getCurrentTime() - 10);
                lastSeekTimeRef.current = Date.now(); 
                player.seekTo(newTime, true);
                setCurrentTime(newTime);
            };

            const handleTimelineClick = (e) => {
                if (!player) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const clickRatio = (e.clientX - rect.left) / rect.width;
                let targetTime = clickRatio * MAX_ALLOWED_TIME;

                if (!isTeacherModeRef.current && targetTime > maxTimeWatchedRef.current) {
                    targetTime = maxTimeWatchedRef.current; 
                } else if (isTeacherModeRef.current && targetTime > maxTimeWatchedRef.current) {
                    // If teacher skips forward, officially update the max watched time so questions trigger properly
                    maxTimeWatchedRef.current = targetTime;
                    setMaxTimeWatched(targetTime);
                    localStorage.setItem('aztec_video_max_time', targetTime.toString());
                }
                
                lastSeekTimeRef.current = Date.now(); 
                player.seekTo(targetTime, true);
                setCurrentTime(targetTime);
            };

            // Quiz UI Handlers
            const handleOptionClick = (index) => {
                if (showFeedback) return; // Prevent changing answer
                setSelectedOption(index);
                setShowFeedback(true);
            };

            const handleContinueVideo = () => {
                const newAnswers = new Set(answeredQuestions).add(activeQuestion.id);
                setAnsweredQuestions(newAnswers);
                
                // Save answered questions to localStorage so they don't pop up again on refresh
                localStorage.setItem('aztec_video_answers', JSON.stringify(Array.from(newAnswers)));
                
                setActiveQuestion(null);
                setSelectedOption(null);
                setShowFeedback(false);
                
                lastSeekTimeRef.current = Date.now(); 
                player.playVideo();
            };

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = Math.floor(seconds % 60).toString().padStart(2, '0');
                return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
            };

            const maxWatchedStyle = { width: `${(maxTimeWatched / MAX_ALLOWED_TIME) * 100 || 0}%` };
            const currentTimeStyle = { width: `${(currentTime / MAX_ALLOWED_TIME) * 100 || 0}%` };

            const downloadCSV = () => {
                const rows = [
                    ["Metric", "Value"],
                    ["Max Time Watched (seconds)", Math.floor(maxTimeWatchedRef.current)],
                    ["Total Tab Violations", violations],
                    ["Questions Completed", `${answeredQuestionsRef.current.size} / ${QUIZ_QUESTIONS.length}`],
                    ["Completion Date", new Date().toLocaleString()]
                ];
                
                const csvContent = rows.map(r => r.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "student_video_results.csv");
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Automatically download CSV when finished
            useEffect(() => {
                if (view === 'finished') {
                    downloadCSV();
                }
            }, [view]);

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinInput === TEACHER_PIN) {
                    setIsTeacherMode(true);
                    isTeacherModeRef.current = true;
                    setShowPinModal(false);
                    setPinInput("");
                    setPinError(false);
                } else {
                    setPinError(true);
                    setPinInput("");
                }
            };

            if (view === 'instructions') {
                return (
                    <div className="max-w-4xl w-full bg-slate-800 p-10 rounded-2xl shadow-2xl border border-slate-700 relative">
                        {/* Discreet Teacher Login Button */}
                        <button 
                            onClick={() => setShowPinModal(true)}
                            className="absolute top-4 right-4 text-slate-700 hover:text-slate-400 transition-colors"
                            title="Teacher Access"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </button>

                        <h1 className="text-4xl font-black text-white mb-8 border-b border-slate-700 pb-6 uppercase tracking-wider text-center">
                            Instructions
                        </h1>
                        <div className="space-y-6 text-2xl leading-relaxed text-slate-200 font-medium">
                            <p>
                                Watch only the first <strong className="text-amber-400">2 hours, 56 min 34 seconds</strong> (that is the first 4 episodes of the show).
                            </p>
                            <p>
                                The video will periodically pause to ask you questions. You must answer them to continue.
                            </p>
                            <p>
                                Then start to answer the questions in the paper provided. You will have either 2 or 4 class periods to complete (depending on A or B day). 
                            </p>
                            <p className="text-red-400 font-bold bg-red-900/20 p-4 rounded-xl border border-red-500/30">
                                Do not take the paper home, you will turn it to the teacher at the end of every period. 
                            </p>
                            <p className="text-xl text-slate-400 italic">
                                One of this is going to be considered a test grade.
                            </p>
                            <p className="text-lg text-green-400 font-bold bg-green-900/20 p-4 rounded-xl border border-green-500/30">
                                💾 Your progress is automatically saved. If you accidentally close this tab, you will resume exactly where you left off.
                            </p>
                        </div>
                        <div className="mt-12 flex justify-center">
                            <button 
                                onClick={() => setView('video')}
                                className="bg-green-600 hover:bg-green-500 text-white px-12 py-5 rounded-xl font-black text-2xl shadow-[0_0_20px_rgba(22,163,74,0.4)] transition-all transform hover:scale-105 uppercase tracking-wide"
                            >
                                Go to the Video
                            </button>
                        </div>

                        {/* PIN Entry Modal */}
                        {showPinModal && (
                            <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex items-center justify-center rounded-2xl">
                                <div className="bg-slate-800 p-8 rounded-xl border border-slate-600 shadow-2xl w-96 max-w-full relative">
                                    <button 
                                        onClick={() => { setShowPinModal(false); setPinError(false); }}
                                        className="absolute top-3 right-3 text-slate-400 hover:text-white"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                    </button>
                                    <h2 className="text-2xl font-bold text-white mb-4 text-center">Teacher Override</h2>
                                    <form onSubmit={handlePinSubmit} className="flex flex-col gap-4">
                                        <input 
                                            type="password" 
                                            value={pinInput}
                                            onChange={(e) => setPinInput(e.target.value)}
                                            placeholder="Enter PIN" 
                                            className="w-full bg-slate-700 text-white px-4 py-3 rounded-lg border focus:outline-none text-center text-xl tracking-widest font-mono"
                                            autoFocus
                                        />
                                        {pinError && <p className="text-red-400 text-sm text-center font-bold">Incorrect PIN.</p>}
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-colors">
                                            Unlock Timeline
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (view === 'finished') {
                return (
                    <div className="max-w-3xl w-full bg-slate-800 p-10 rounded-2xl shadow-2xl border border-slate-700 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mx-auto text-green-400 mb-6"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                        <h1 className="text-4xl font-black text-white mb-4">Video Completed</h1>
                        <p className="text-2xl text-slate-300 mb-4">
                            You have reached the 2 hour, 56 minute, and 34-second mark.
                        </p>
                        <p className="text-xl text-slate-400 mb-8 font-mono">
                            Final Interactive Score: {answeredQuestions.size} / 100
                        </p>
                        
                        <div className="bg-slate-700/50 rounded-xl p-6 mb-8 border border-slate-600">
                            <h3 className="text-xl font-bold text-blue-400 mb-2">📥 Results Downloaded Automatically</h3>
                            <p className="text-slate-300 mb-4">Your results CSV file has been downloaded. If your browser blocked it, please click the button below to download it manually.</p>
                            <button 
                                onClick={downloadCSV}
                                className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition-colors shadow-lg"
                            >
                                Download Results Again
                            </button>
                        </div>

                        <p className="mt-8 text-xl text-amber-400 font-bold">
                            Please complete the questions on your provided paper. Do not forget to turn it in!
                        </p>
                    </div>
                );
            }

            return (
                <div className="w-full flex flex-col items-center gap-6 animate-fadeIn">
                    <div className="text-center space-y-2">
                        <h1 className="text-3xl font-bold text-white">Class Video Assignment</h1>
                        {isTeacherMode ? (
                            <p className="text-green-400 font-bold bg-green-900/30 px-4 py-1 rounded-full inline-block border border-green-500/50">
                                🔓 TEACHER MODE ACTIVE: Free Seeking Enabled (Tab Anti-Cheat Disabled)
                            </p>
                        ) : (
                            <p className="text-red-400 font-bold animate-pulse">Do NOT open other tabs or windows.</p>
                        )}
                    </div>

                    <div className="w-full flex flex-col rounded-xl shadow-2xl overflow-hidden border border-slate-700 relative">
                        <div className="relative w-full aspect-video bg-black">
                            <div className="absolute inset-0 pointer-events-none">
                                <div ref={playerContainerRef} className="w-full h-full"></div>
                            </div>
                        </div>

                        {/* Interactive Question Modal Overlay */}
                        {activeQuestion && (
                            <div className="absolute inset-0 bg-slate-900/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-8 overflow-y-auto">
                                <div className="max-w-3xl w-full bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-600 my-auto">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold text-white leading-relaxed">
                                            {activeQuestion.text}
                                        </h2>
                                        <span className="bg-blue-600 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap ml-4">
                                            Question {activeQuestion.id} of 100
                                        </span>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {activeQuestion.options.map((option, idx) => {
                                            let btnStyles = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 font-medium ";
                                            
                                            if (!showFeedback) {
                                                btnStyles += "border-slate-600 hover:border-blue-400 hover:bg-slate-700 bg-slate-700/50 text-slate-200";
                                            } else {
                                                if (idx === activeQuestion.correctIndex) {
                                                    btnStyles += "border-green-500 bg-green-500/20 text-green-100"; 
                                                } else if (idx === selectedOption) {
                                                    btnStyles += "border-red-500 bg-red-500/20 text-red-100"; 
                                                } else {
                                                    btnStyles += "border-slate-700 bg-slate-800 text-slate-500 opacity-50"; 
                                                }
                                            }

                                            return (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => handleOptionClick(idx)}
                                                    className={btnStyles}
                                                    disabled={showFeedback}
                                                >
                                                    <span className="inline-block w-8 font-bold opacity-70">
                                                        {String.fromCharCode(65 + idx)}.
                                                    </span>
                                                    {option}
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {showFeedback && (
                                        <div className="mt-8 flex justify-between items-center animate-fadeIn">
                                            <div className={`text-xl font-bold ${selectedOption === activeQuestion.correctIndex ? 'text-green-400' : 'text-red-400'}`}>
                                                {selectedOption === activeQuestion.correctIndex ? '✓ Correct!' : '✗ Incorrect.'}
                                            </div>
                                            <button 
                                                onClick={handleContinueVideo}
                                                className="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-lg font-bold shadow-lg transition-colors text-lg"
                                            >
                                                Continue Video
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Custom Control Bar */}
                        <div className="w-full bg-slate-800 p-5 flex flex-col gap-3 z-40">
                            {/* Timeline strictly mapped to the assigned duration */}
                            <div 
                                className="relative w-full h-3 bg-slate-700 rounded-full cursor-pointer group"
                                onClick={handleTimelineClick}
                            >
                                {/* Max Watched Buffer */}
                                <div 
                                    className="absolute top-0 left-0 h-full bg-slate-500 rounded-full opacity-50 transition-all duration-200"
                                    style={maxWatchedStyle}
                                ></div>
                                
                                {/* Current Time Progress */}
                                <div 
                                    className="absolute top-0 left-0 h-full bg-blue-500 rounded-full transition-all duration-200"
                                    style={currentTimeStyle}
                                ></div>

                                {/* Question Markers on Timeline */}
                                {MAX_ALLOWED_TIME > 0 && QUIZ_QUESTIONS.map(q => {
                                    // Make the markers tiny since there are 100 of them
                                    const markerStyle = { left: `calc(${(q.timestamp / MAX_ALLOWED_TIME) * 100}% - 2px)` };
                                    return (
                                        <div 
                                            key={q.id}
                                            className={`absolute top-1/2 -translate-y-1/2 w-1 h-2 rounded-full ${answeredQuestions.has(q.id) ? 'bg-green-400 opacity-60' : 'bg-amber-400'}`}
                                            style={markerStyle}
                                            title={`Question ${q.id}`}
                                        ></div>
                                    );
                                })}
                            </div>

                            {/* Controls row */}
                            <div className="flex items-center gap-5 mt-2">
                                <button 
                                    onClick={togglePlayPause}
                                    className="text-white hover:text-blue-400 transition-colors focus:outline-none"
                                    disabled={!!activeQuestion}
                                    title={isPlaying ? "Pause" : "Play"}
                                >
                                    {isPlaying ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                                    )}
                                </button>
                                
                                <button 
                                    onClick={handleRewind}
                                    className="text-white hover:text-blue-400 transition-colors focus:outline-none flex items-center gap-1"
                                    disabled={!!activeQuestion}
                                    title="Rewind 10 Seconds"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                                    <span className="text-sm font-bold -ml-0.5">10s</span>
                                </button>
                                
                                <button 
                                    onClick={toggleCC}
                                    className={`transition-colors focus:outline-none ${ccEnabled ? 'text-blue-400' : 'text-slate-400 hover:text-white'}`}
                                    title={ccEnabled ? "Turn Off Captions" : "Turn On Captions"}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="14" x="3" y="5" rx="2" ry="2"/><path d="M7 15h4M15 15h2M7 11h2M13 11h4"/></svg>
                                </button>

                                {/* Playback Speed Button */}
                                <div className="ml-2 flex items-center gap-3 hidden md:flex">
                                    <span className="text-2xl">😊</span>
                                    <span className="text-sm font-bold text-amber-400 uppercase tracking-wide">ok, you can speed up to 1.25x</span>
                                    
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-red-500 animate-pulse drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]">
                                        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                                    </svg>
                                    
                                    <button 
                                        onClick={toggleSpeed}
                                        disabled={!!activeQuestion}
                                        className={`px-4 py-1.5 rounded-lg border-2 font-bold transition-all focus:outline-none disabled:opacity-50 ${playbackRate === 1.25 ? 'bg-amber-500/20 border-amber-400 text-amber-400 shadow-[0_0_10px_rgba(251,191,36,0.3)]' : 'border-slate-500 text-white hover:border-white shadow-[0_0_10px_rgba(255,255,255,0.2)]'}`}
                                        title="Toggle Speed"
                                    >
                                        {playbackRate}x
                                    </button>
                                </div>

                                <div className="text-base font-medium text-slate-300 font-mono ml-auto flex items-center gap-4">
                                    <div className="flex gap-3 text-xs">
                                        <span className="flex items-center gap-1 text-amber-400"><span className="w-2 h-2 rounded-full bg-amber-400"></span>{100 - answeredQuestions.size}</span>
                                        <span className="flex items-center gap-1 text-green-400"><span className="w-2 h-2 rounded-full bg-green-400"></span>{answeredQuestions.size}</span>
                                    </div>
                                    {formatTime(currentTime)} / {formatTime(MAX_ALLOWED_TIME)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
